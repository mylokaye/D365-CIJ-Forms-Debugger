<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamics 365 Form Debugger</title>
  <style>
    :root {
      color-scheme: light;
      --background: #ffffff;
      --surface: #fbfbfb;
      --text: #171717;
      --text-muted: #6d6d6d;
      --border: #e7e7e7;
      --success: #07883b;
      --success-surface: #f5fbf7;
      --focus: #3360c5;
      --radius: 17px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--background);
    }

    body {
      width: 400px;
      height: 218px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    button {
      font: inherit;
    }

    .popup-shell {
      min-height: 218px;
      padding: 13px 12px;
    }

    .product-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .product-logo {
      width: 34px;
      height: 34px;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 8px 0 0;
      font-size: 17px;
      font-weight: 450;
      line-height: 1.08;
      letter-spacing: -0.025em;
    }

    .details-panel {
      margin-top: 9px;
      padding: 11px 14px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 22px rgb(0 0 0 / 4%);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .cache-status {
      width: 90px;
      height: 26px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      background: var(--success-surface);
      border: 1px solid var(--success);
      border-radius: 11px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .info-button {
      width: 25px;
      height: 25px;
      padding: 3px;
      display: grid;
      place-items: center;
      color: #555555;
      background: transparent;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
    }

    .info-button svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
    }

    .form-id {
      width: 100%;
      margin: 12px 0 0;
      padding: 0;
      display: flex;
      align-items: baseline;
      gap: 3px;
      overflow: hidden;
      color: var(--text-muted);
      background: transparent;
      border: 0;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
    }

    .form-id-label {
      flex: 0 0 auto;
      color: #555555;
      font-weight: 700;
    }

    .form-id-value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .form-id.is-copied .form-id-value {
      color: var(--success);
    }

    .form-id:disabled {
      cursor: default;
    }

    .version {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.25;
    }

    .form-id:not(:disabled):hover .form-id-value {
      color: var(--text);
    }

    .form-id:focus-visible,
    .info-button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="popup-shell">
    <header class="product-header">
      <img class="product-logo" src="icons/icon300.png" alt="">
      <h1>Dynamics 365<br>Form Debugger</h1>
    </header>

    <section class="details-panel" aria-label="Extension details">
      <div class="panel-header">
        <div class="cache-status" role="status">Cache disabled</div>
        <button class="info-button" id="extension-info" type="button" title="Open support" aria-label="Open extension support">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 10.8v6"></path>
            <path d="M12 7.4h.01"></path>
          </svg>
        </button>
      </div>

      <button class="form-id" id="form-id" type="button" title="Copy Form ID">
        <span class="form-id-label">Form ID:</span>
        <span class="form-id-value" id="form-id-value" aria-live="polite">---</span>
      </button>

      <p class="version" id="extension-version">V ---</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
