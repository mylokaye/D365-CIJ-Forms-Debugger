<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Debugger</title>
  <style>
    :root {
      color-scheme: light;
      --background: #ffffff;
      --surface: #f8f8f8;
      --text: #262626;
      --text-muted: #686868;
      --border: #e7e7e7;
      --border-strong: #dddddd;
      --success: #07883b;
      --success-surface: #edf8f0;
      --success-border: #cfead7;
      --danger: #b42318;
      --danger-surface: #fff3f2;
      --danger-border: #f4d1cd;
      --focus: #1a73e8;
      --radius-panel: 16px;
      --shadow: 0 8px 24px rgb(0 0 0 / 6%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--background);
    }

    body {
      width: 350px;
      min-height: 350px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    .popup-shell {
      min-height: 350px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .product-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 2px 2px 4px;
    }

    .product-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      display: grid;
      place-items: center;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--surface);
    }

    .product-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
    }

    .product-copy {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      line-height: 1.2;
      letter-spacing: -0.025em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .details-panel {
      overflow: hidden;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
      box-shadow: var(--shadow);
      transition: background-color 160ms ease, opacity 160ms ease;
    }

    .info-row {
      min-height: 62px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .info-row + .info-row {
      border-top: 1px solid var(--border);
    }

    .info-label {
      flex: 0 0 auto;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 550;
      line-height: 1.3;
    }

    .info-value {
      min-width: 0;
      max-width: 190px;
      padding: 5px 7px;
      overflow: hidden;
      color: var(--text);
      background: transparent;
      border: 0;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      text-align: right;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: color 140ms ease, background-color 140ms ease;
    }

    .info-value:hover {
      background: var(--surface);
    }

    .info-value:focus-visible,
    .footer-links a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .info-value.is-copied {
      color: var(--success);
      background: var(--success-surface);
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-button {
      min-height: 36px;
      padding: 8px 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      color: var(--text-muted);
      background: var(--surface);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.2;
      text-align: center;
      white-space: nowrap;
    }

    .status-button::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-green {
      color: var(--success);
      background: var(--success-surface);
      border-color: var(--success-border);
    }

    #cache-toggle.status-green {
      background: var(--background);
      border-color: var(--success);
    }

    .status-red {
      color: var(--danger);
      background: var(--danger-surface);
      border-color: var(--danger-border);
    }

    .footer {
      margin-top: auto;
      padding-top: 3px;
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 11px;
    }

    .footer-links a {
      padding: 3px 2px;
      color: var(--text-muted);
      border-radius: 4px;
      text-decoration: underline;
      text-decoration-color: #c5c5c5;
      text-underline-offset: 3px;
      transition: color 140ms ease, text-decoration-color 140ms ease;
    }

    .footer-links a:hover {
      color: var(--text);
      text-decoration-color: var(--text);
    }

    .separator {
      color: #c8c8c8;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="popup-shell">
    <header class="product-header">
      <div class="product-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="3"></rect>
          <path d="M3 9h18M8.5 13l-2 2 2 2M15.5 13l2 2-2 2"></path>
        </svg>
      </div>
      <div class="product-copy">
        <h1>Form Debugger</h1>
        <p class="subtitle">Dynamics 365 Customer Insights</p>
      </div>
    </header>

    <section class="details-panel" aria-label="Detected form details">
      <div class="info-row">
        <span class="info-label">Form ID</span>
        <button class="info-value" id="form-id" type="button" title="Copy Form ID">---</button>
      </div>
      <div class="info-row">
        <span class="info-label">Fields detected</span>
        <button class="info-value" id="fields-count" type="button" title="Copy field count">0</button>
      </div>
    </section>

    <div class="status-grid" aria-label="Extension status">
      <div class="status-button" id="form-status" role="status" aria-live="polite">Form not detected</div>
      <div class="status-button status-green" id="cache-toggle" role="status" aria-live="polite">Cache disabled</div>
    </div>

    <footer class="footer">
      <nav class="footer-links" aria-label="Help links">
        <a href="https://pattens.tech/contact" id="report-feedback">Report feedback</a>
        <span class="separator" aria-hidden="true">·</span>
        <a href="https://pattens.tech/dynamics-365-form-debugger" id="get-support">Get support</a>
      </nav>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
